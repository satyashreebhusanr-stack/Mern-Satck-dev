<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>job application</title>
    <link rel="stylesheet" href="03-project.css">
</head>
<body>
    <div class="container">
        <form>
            <div class="content">
                <h1>job application web</h1>
                <section class="top_section">
                    <div class="firstname">
                    <label for="fname">First Name</label>
                    <br>
                    <input type="text">
                    </div>
                    <div class="lastname">
                        <label for="lname">Last Name</label>
                        <br>
                        <input type="text">
                    </div>
                </section>



                <section class="second_section">
                    <div>
                        <label for="email">Email</label>
                        <br>
                        <input type="email">
                    </div>
                    <div class="Jobrole">
                        <label for="jobrole">Job Role</label>
                        <br>
                        <select>
                            <option>backend developer</option>
                            <option>frontend developer</option>
                            <option>tester</option>
                            <option>developer</option>
                        </select>
                    </div>
                </section>


                <section class="third_section">
                    <div class="Address">
                        <label for="address">Adderess</label>
                        <textarea></textarea>
                    </div>
                </section>




                <section class="midle1_section">
                    <div class="City">
                        <label for="city">City</label>
                        <input type="text">
                    </div>
                    <div class="pin">
                        <label for="code">Pincode</label>
                        <input type="number">
                    </div>
                    </section>




                    <section class="midle2_section">
                    <div class="Date">
                        <label for="date">Start Date</label>
                        <input type="date">
                    </div>
                    <div class="upload">
                        <label for="upload cv">Upload your Cv</label>
                        <input type="file">
                    </div>
                </section>



                <section class="buttom_section">
                <footer>
                    <button type="submit">Apply Now</button>
                </footer>
                </section>


            </div>
        </form>
    </div>
</body>
</html>
