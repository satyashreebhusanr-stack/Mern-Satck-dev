<!DOCTYPE html>
<html lang="en">
<head>
    <title>class selector</title>
    <style>
        h1{
            color:aqua;
            background-color: black;
        }
        .demo{
            color:aquamarine;
            background-color: red;
        }
    </style>
</head>
<body>
    <h1>Today is a good day</h1>
    <h1 class="demo">it is a good day</h1>
    <h1>Today is a good day</h1>
    <h1>Today is a good day</h1>
    <h1>Today is a good day</h1>
    <h1>Today is a good day</h1>
    <h1>Today is a good day</h1>
</body>
</html>
